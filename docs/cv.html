<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thomas Tomlinson — CV</title>
  <link rel="icon" type="image/png" href="images/kilt_logo.png">
  <style>
    body {
      margin: 0;
      background-color: #F5F5F5;
      color: #000000;
      font-family: Arial, sans-serif;
      font-size: 100%;
    }

    nav {
      background-color: #222;
      display: flex;
      font-size: 2em;
      align-items: center;
      justify-content: center; /* desktop links centered */
      position: relative;
      height: 80px;
      padding: 0 1em;
    }

    .nav-image-wrapper {
      position: absolute;
      left: 0;
      top: 0;
      width: 260px;
      height: 100%;
    }

    .nav-image {
      width: 100%;
      height: 100%;
      background: url("images/kilt_plot.png") no-repeat left top;
      background-size: contain;
    }

    .nav-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, rgba(34,34,34,0) 40%, #222 100%);
    }

    .nav-links a {
      color: #ebb8d9;
      text-decoration: none;
      margin: 0 1em;
      font-weight: bold;
      transition: color 0.3s;
      position: relative;
      z-index: 1;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Hamburger hidden on desktop */
    .hamburger {
      display: none;
      font-size: 2em;
      color: #ebb8d9;
      cursor: pointer;
      z-index: 2;
    }

    .content {
      display: flex;
      flex-direction: column; 
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 1.5em;
      margin: 60px auto;
      width: 80%;
      max-width: 1000px;
    }

    embed {
      align-items: center;
    }

    h1 {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 3em;
      margin: 60px auto;
      margin-bottom: 3em;
      width: 80%;
      max-width: 1000px;
      color: #000000; /* Neon green */
      font-family: Garamond, serif;
    }

    footer {
      background-color: #ff5f00;   /* neon orange */
      color: #39ff14;              /* neon green text */
      padding: 20px;
      margin-top: 40px;
      text-align: center;
      border-radius: 8px;         /* makes it look like a box */
    }

    @media (max-width: 600px) {
  body {
    font-size: 60%; /* scales down all text */
  }

  nav {
    flex-direction: row;
    justify-content: center;
    align-items: center;
    height: 60px;
  }

  .hamburger {
    display: block;
    position: absolute;
    right: 1em;
  }

  .nav-links {
    display: flex;
    flex-direction: column;
    position: absolute;
    top: 60px;         /* below header */
    left: 50%;
    transform: translateX(-50%);
    background-color: #222;
    padding: 0.5em 0;
    border-radius: 5px;

    max-height: 0;     /* hidden by default */
    overflow: hidden;
    transition: max-height 0.3s ease-out;
  }

  .nav-links.show {
    max-height: 300px; /* menu opens */
  }

  /* Only show current link in collapsed state */
  .nav-links a {
    display: none; 
    margin: 0.5em 1.5em;
    font-size: 1.2em;
    text-align: center;
  }

  .nav-links a.current {
    display: block;   /* always visible */
  }
}
    
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="research.html">Research</a>
    <a href="cv.html">CV</a>
    <a href="contact.html">Contact</a>
  </nav>

  <div class="content">
    <h1>CV</h1>

    <p>
      <a href="CV.pdf" download>Download my CV here</a>.
    </p>
    
    <embed src="CV.pdf" type="application/pdf" width="100%" height="800px" />
    
  </div>
  <footer>
    <p>© 2026 Thomas Tomlinson | Last updated: March 2026</p>
    <p>email: thomas.j.tomlinson@durham.ac.uk</p>
  </footer>
</body>
</html>
