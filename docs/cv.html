<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thomas Tomlinson — CV</title>
  <link rel="icon" type="image/png" href="images/kilt_logo.png">
  <style>
    body {
      margin: 0;
      background-color: #F5F5F5;
      color: #000000;
      font-family: Arial, sans-serif;
      font-size: 100%;
    }

    nav {
      background-color: #222;
      display: flex;
      font-size: 2em;
      align-items: center;
      justify-content: center; /* desktop links centered */
      position: relative;
      height: 80px;
      padding: 0 1em;
    }

    .nav-image-wrapper {
      position: absolute;
      left: 0;
      top: 0;
      width: 80px;
      height: 100%;
    }

    .nav-image {
      width: 100%;
      height: 100%;
      background: url("images/kilt_plot.png") no-repeat left top;
      background-size: contain;
    }

    .nav-gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, #222 100%);
    }

    /* Desktop links */
    .nav-links {
      display: flex;
      gap: 1em;
      z-index: 2; /* above image/gradient */
    }

    .nav-links a {
      color: #ebb8d9;
      text-decoration: none;
      margin: 0 1em;
      font-weight: bold;
      transition: color 0.3s;
      position: relative;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Hamburger hidden on desktop */
    .hamburger {
      display: none;
      font-size: 2em;
      color: #ebb8d9;
      cursor: pointer;
      z-index: 3;
    }

    .content {
      display: flex;
      flex-direction: column; 
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 1.5em;
      margin: 60px auto;
      width: 80%;
      max-width: 1000px;
    }

    embed {
      align-items: center;
    }

    h1 {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 3em;
      margin: 60px auto;
      margin-bottom: 3em;
      width: 80%;
      max-width: 1000px;
      color: #000000; /* Neon green */
      font-family: Garamond, serif;
    }

    footer {
      background-color: #ff5f00;   /* neon orange */
      color: #39ff14;              /* neon green text */
      padding: 20px;
      margin-top: 40px;
      text-align: center;
      border-radius: 8px;         /* makes it look like a box */
    }

    @media (max-width: 600px) {
  body {
    font-size: 60%; /* scales down all text */
  }

  nav {
    justify-content: space-between; /* logo left, hamburger right */
    height: auto; /* allow nav to grow */
    min-height: 60px;
    padding: 0.5em 1em;
  }

  .hamburger {
    display: block;
    position: absolute;
    right: 1em;
  }

  .nav-links {
    flex-direction: column;
    position: relative; /* not absolute */
    max-height: 0;      /* hidden by default */
    overflow: hidden;
    width: 100%;
    background-color: #222;
    transition: max-height 0.3s ease;
    margin-top: 0.5em;
  }

  .nav-links.show {
    max-height: 300px; /* menu opens */
  }

  /* Always show current link at top */
  .nav-links a {
    display: none;
    text-align: center;
    padding: 0.5em 0;
  }

  .nav-links a.current {
      display: flex;
      color: #ebb8d9;
      text-decoration: none;
      margin: 0 1em;
      font-weight: bold;
      transition: color 0.3s;
      position: relative;
  }
}
    
  </style>
</head>
<body>
  <nav>
    <div class="nav-image-wrapper">
      <div class="nav-image"></div>
      <div class="nav-gradient"></div>
    </div>

    <!-- Hamburger icon -->
    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <!-- Links -->
    <div class="nav-links">
      <a href="index.html" >Home</a>
      <a href="research.html">Research</a>
      <a href="cv.html" class="current">CV</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <script>
  function toggleMenu() {
    const links = document.querySelector('.nav-links');
    links.classList.toggle('show');

    // Show all links when menu is open
    if (links.classList.contains('show')) {
      links.querySelectorAll('a').forEach(link => link.style.display = 'block');
    } else {
      // Only show current link when menu is closed
      links.querySelectorAll('a').forEach(link => {
        if (!link.classList.contains('current')) {
          link.style.display = 'none';
        }
      });
    }
  }
  </script>

  <div class="content">
    <h1>CV</h1>

    <p>
      <a href="CV.pdf" download>Download my CV here</a>.
    </p>
    
    <embed src="CV.pdf" type="application/pdf" width="100%" height="800px" />
    
  </div>
  <footer>
    <p>© 2026 Thomas Tomlinson | Last updated: March 2026</p>
    <p>email: thomas.j.tomlinson@durham.ac.uk</p>
  </footer>
</body>
</html>
